<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azukimochi Django Girls blog</title>

    <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap-theme.min.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-default">
            <div class="container-fluid">
              <div class="navbar-header">
                <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navigation">
                  <span class="icon-bar"></span>
                  <span class="icon-bar"></span>
                  <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="#">myBootstrapサンプル</a>
              </div>
            </div>
          </nav>
    </header>
    <main>
        <div>
            <h1><a href="https://tutorial.djangogirls.org/ja/">Django Girls Blog</a></h1>
        </div>

        <div>
            {% for post in posts %}
                <ul style="list-style-type: none;">
                    <li><h3>{{ post.title }}</h3></li>
                    <li>{{ post.text }}</li>
                    <li>投稿日:{{ post.published_date }}</li>
                </ul>
            {% endfor %}
        </div>
    </main>
    <footer><a href="/admin">my admin</a></footer>
</body>
</html>
